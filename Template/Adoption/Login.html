<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

     body {
            background: linear-gradient(135deg, #74ebd5 0%, #ACB6E5 100%);
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }

        .glass-background {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            padding: 2rem;
            margin-top: 50px;
            max-width: 400px;
            width: 100%;
        }


        .table th,
        .table td {
            background-color: rgba(255, 255, 255, 0.5);
            color: #000;
            font-weight: bold;
            vertical-align: middle;
            padding: 10px;
        }

        .table th {
            background-color: rgba(255, 255, 255, 0.7);
        }

        img {
            border-radius: 10px;
        }

        .btn-primary,
        .btn-info {
            font-weight: bold;
        }


        .glass-input {
            background-color: rgba(255, 255, 255, 0.3);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 10px;
            margin-bottom: 15px;
            width: 100%;
            border-radius: 5px;
            backdrop-filter: blur(5px);
        }

        .glass-input:focus {
            outline: none;
            border: 1px solid #fff;
        }



        .form-label {
            color: white;
        }

        .btn-secondary {
            background-color: #8B4513;
            color: white;
            font-weight: bold;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
        }

        .btn-secondary:hover {
            background-color: #6A3D1A;
        }
header {
    width: 100%;
    position: relative;
}

header nav {
    max-width: 1200px;
    margin: auto;
    display: flex;
    justify-content: space-between;
    align-items: center;

    padding: 12px 20px;
}

.logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
}

.logo-mark {
    width: 40px;
    height: 40px;
    background: #1e293b;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    font-weight: bold;
}

.logo-name {
    color: white;
    font-size: 18px;
    font-weight: bold;
}

/* NAV LINKS */
.nav-links a {
    text-decoration: none;
    color: #111;
    margin-left: 10px;

    padding: 8px 14px;
    border-radius: 10px;

    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(0,0,0,0.1);

    transition: 0.3s;
}

.nav-links a:hover {
    background: rgba(0,0,0,0.1);
    transform: translateY(-2px);
}

.nav-links a.active {
    background: rgba(0,0,0,0.2);
}

        header {
    width: 100%;
    position: relative;
}

/* 👇 THIS IS THE LINE */
header::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: 0;

    width: 100%;
    height: 1px;

    background: rgba(255, 255, 255, 0.5);
}
        .nav-links a {
    text-decoration: none;

    color: #111111;   /* 🔥 BLACK TEXT */

    font-size: 15px;
    font-weight: 600;

    padding: 8px 16px;
    border-radius: 12px;

    background: rgba(0,0,0,0.04);
    border: 1px solid rgba(0,0,0,0.08);

    transition: all 0.25s ease;

    display: inline-flex;
    align-items: center;
    gap: 6px;
}

/* hover */
.nav-links a:hover {
    background: rgba(0,0,0,0.10);
    color: #000000;
    transform: translateY(-2px);
}

/* active */
.nav-links a.active {
    color: #111111;
    background: rgba(0,0,0,0.08);
}
.logo-name {
    color: #111111 !important;  /* 🔥 black text */
}

.logo-mark {
    background: #111111 !important;  /* black box */
    color: #ffffff !important;       /* white text inside */
}


    </style>
</head>
<body>

<header>
  <nav>

    <!-- LOGO -->
    <a href="{% url 'home' %}" class="logo">
        <span class="logo-mark">PP</span>
        <span class="logo-name">Puurfect Pals</span>
    </a>

    <!-- MENU -->
    <div class="nav-links">
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'about_page' %}">About Us</a>
        <a href="{% url 'services_page' %}">Service</a>
        <a href="{% url 'contact_page' %}">Contact Us</a>

        <a href="{% url 'login' %}" >Login</a>
        <a href="{% url 'register' %}">Sign Up</a>
    </div>

  </nav>
</header>


    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card shadow glass-background">
            <div class="card-header text-center">
                <h3>Login</h3>
            </div>
            <div class="card-body">
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-light" role="alert">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}

                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" name="username" id="username" class="form-control glass-input" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" name="password" id="password" class="form-control glass-input" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-success">Login</button>
                    </div>
                    <p class="text-center mt-3">
    Don't have an account?
    <a href="{% url 'register' %}" style="color:black; font-weight:bold; text-decoration:none;">
        Sign Up
    </a>
</p>


                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
