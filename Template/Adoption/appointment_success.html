{% extends "Adoption/doctor.html" %}
{% block content %}

<style>
    .success-box {
        background: rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(10px);
        padding: 2rem;
        border-radius: 15px;
        text-align: center;
        color: #000;
        margin-top: 100px;
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
    }

    .success-box h2 {
        font-weight: bold;
        color: #155724;
    }

    .success-box p {
        font-size: 18px;
    }
</style>

<div class="container">
    <div class="success-box">
        <h2>🎉 Appointment Confirmed!</h2>
        <p>Congratulations! Dr. <strong>{{ doctor.name }}</strong> has confirmed your appointment.</p>
        <p>Please visit the clinic at <strong>{{ doctor.clinic_address }}</strong>.</p>
        <a href="{% url 'doctor' %}" class="btn btn-dark mt-3">Back</a>
    </div>
</div>

{% endblock %}
