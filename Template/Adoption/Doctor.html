<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Doctors</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #74ebd5 0%, #ACB6E5 100%);
            min-height: 100vh;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        .glass-background {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            padding: 2rem;
            margin-top: 50px;
        }

        .doctor-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 1rem;
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .doctor-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .doctor-img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 0.5rem;
            cursor: pointer;
        }

        .doctor-name {
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .btn-details {
            font-weight: bold;
            width: 100%;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
        }
        .glass-btn {
    padding: 10px 18px;
    border-radius: 12px;

    background: rgba(255, 255, 255, 0.25);
    border: 1px solid rgba(255, 255, 255, 0.4);

    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);

    color: #111;
    font-weight: 600;
    text-decoration: none;

    box-shadow: 0 6px 20px rgba(0,0,0,0.1);

    transition: all 0.3s ease;

    display: inline-block;
}

.glass-btn:hover {
    background: rgba(255, 255, 255, 0.4);
    transform: translateY(-2px);
}

.glass-btn:active {
    transform: scale(0.96);
}
        a.btn.btn-primary.btn-details {
    background: rgba(255, 255, 255, 0.22) !important;
    border: 1px solid rgba(255, 255, 255, 0.45) !important;

    color: #1e293b !important;

    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);

    box-shadow:
        0 6px 20px rgba(0,0,0,0.08),
        inset 0 1px 2px rgba(255,255,255,0.6);

    transition: all 0.3s ease;
}

/* hover effect */
a.btn.btn-primary.btn-details:hover {
    background: rgba(255, 255, 255, 0.35) !important;
    transform: translateY(-2px);
}

    </style>
</head>
<body>

{% load static %}
{% include 'Adoption/Navbar.html' %}
{% block content %}

<div class="container d-flex justify-content-center">
    <div class="glass-background w-100" style="max-width: 1200px;">
        <h2 class="text-center mb-4">Available Doctors</h2>



        <!-- Admin: Add Doctor button -->
        {% if user.is_staff %}
           <div class="mb-3 text-end">
    <a href="{% url 'upload_doctor' %}" class="glass-btn">
        Add Doctor
    </a>
</div>
        {% endif %}

        <!-- Doctor Grid -->
        <div class="grid-container mb-4">
            {% for d in doctors %}
                <div class="doctor-card">
                    <!-- Image + Details link -->
                    <a href="{% url 'doctor_details' d.id %}">
                        {% if d.image %}
                            <img src="{{ d.image.url }}" alt="{{ d.name }}" class="doctor-img">
                        {% else %}
                            <img src="https://via.placeholder.com/120" class="doctor-img">
                        {% endif %}
                    </a>
                    <div class="doctor-name">{{ d.name }}</div>

                    <!-- Details button (always visible) -->
                    <a href="{% url 'doctor_details' d.id %}" class="btn btn-primary btn-details mb-1">Details</a>


                </div>
            {% empty %}
                <div class="col-12 text-center">
                    <strong>No doctors available</strong><br>
                </div>
            {% endfor %}
        </div>

    </div>
</div>

{% endblock %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
