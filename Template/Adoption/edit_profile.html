<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #74ebd5 0%, #ACB6E5 100%);
            min-height: 100vh;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        .glass-background {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            padding: 3rem;
            margin-top: 50px;
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 1.5rem;
            width: 100%;
        }

        .glass-input:focus {
            outline: none;
            border-color: #ffffff;
            background: rgba(255, 255, 255, 0.25);
        }

        .glass-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        label.form-label {
            color: #fff;
            font-weight: bold;
        }

        .btn-success {
            background-color: #4CAF50;
            border: none;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 8px;
        }

        .btn-success:hover {
            background-color: #3e8e41;
        }

        h2.edit-heading {
            text-align: center;
            color: #ffffff;
            font-weight: bold;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.4);
        }

      .glass-btn {
    padding: 10px 18px;
    border-radius: 12px;

    background: rgba(255, 255, 255, 0.25);
    border: 1px solid rgba(255, 255, 255, 0.4);

    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);

    color: #111;
    font-weight: 600;
    text-decoration: none;

    box-shadow: 0 6px 20px rgba(0,0,0,0.1);

    transition: all 0.3s ease;

    display: inline-block;
    text-align: center;
}

.glass-btn:hover {
    background: rgba(255, 255, 255, 0.4);
    transform: translateY(-2px);
}

.glass-btn:active {
    transform: scale(0.96);
}
    </style>
</head>
<body>

{% include 'Adoption/Navbar.html' %}

<div class="container mt-5">
    <h2 class="mb-4 edit-heading">Edit Your Profile</h2>

    <form method="POST" enctype="multipart/form-data" class="glass-background">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Name:</label>
            <input type="text" name="name" class="glass-input" value="{{ profile.name }}">
        </div>

        <div class="mb-3">
            <label class="form-label">Phone:</label>
            <input type="text" name="phone" class="glass-input" value="{{ profile.phone }}">
        </div>

        <div class="mb-3">
            <label class="form-label">Address:</label>
            <input type="text" name="address" class="glass-input" value="{{ profile.address }}">
        </div>

        <div class="mb-3">
            <label class="form-label">Profile Picture:</label>
            <input type="file" name="profile_picture" class="glass-input">
            {% if profile.profile_picture %}
                <div class="mt-2">
                    <img src="{{ profile.profile_picture.url }}" alt="Profile Picture" width="120" style="border-radius: 10px;">
                </div>
            {% endif %}
        </div>

       <button type="submit" class="glass-btn">Save Changes</button>

<a href="{% url 'profile' %}" class="glass-btn">Cancel</a>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
