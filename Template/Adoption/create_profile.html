{% extends "Adoption/base.html" %}
{% load static %}

{% block content %}
<div class="glass-background">
    {% if user.is_authenticated %}
        <h3>Welcome, {{ user.username }}</h3>
    {% endif %}

    <h2>Create Profile</h2>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary mt-2 btn-full">Save</button>
    </form>

    <!-- Back to Home Button -->
    <a href="{% url 'pet' %}" class="btn btn-secondary mt-2 btn-full">
        &larr; Back to Home
    </a>
</div>

<style>
/* Full-width buttons */
.btn-full {
    width: 100%;
    padding: 12px;
    font-weight: bold;
    border-radius: 8px;
    text-align: center;
    font-size: 1rem;
    transition: 0.3s;
}

/* Primary Save button */
.btn-primary {
    background-color: rgba(0, 123, 255, 0.8);
    border: none;
    color: #fff;
    cursor: pointer;
}
.btn-primary:hover {
    background-color: rgba(0, 123, 255, 1);
}

/* Secondary Back button */
.btn-secondary {
    background-color: rgba(0, 0, 0, 0.1);
    color: #fff;
    text-decoration: none;
    display: inline-block;
}
.btn-secondary:hover {
    background-color: rgba(0, 0, 0, 0.3);
}
</style>
{% endblock %}
